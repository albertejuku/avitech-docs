name: Deploy Docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 102.207.191.196
          username: albert
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/manual/site
            git pull
            source ../venv/bin/activate && mkdocs build
