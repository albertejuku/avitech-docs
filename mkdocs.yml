site_name: Avitech Cloud - User Manuals
site_url: https://manual.avitechcloud.com
site_description: User documentation for Avitech Cloud systems
site_author: Avitech Cloud

theme:
  name: material
  palette:
    - scheme: default
      primary: light blue
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: light blue
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Logging In: billing/getting-started.md
    - Portal Overview: billing/index.md
  - Subscribers:
    - Overview: subscribers/index.md
    - Subscriber List: subscribers/list.md
    - Adding a Subscriber: subscribers/creating.md
    - Subscriber Details: subscribers/details.md
    - Subscription Tab: subscribers/subscription-tab.md
    - Payments Tab: subscribers/payments-tab.md
    - Sending Messages: subscribers/messaging.md
    - Bulk Operations: subscribers/bulk-operations.md
  - Plans:
    - Overview: plans/index.md
    - Managing Plans: plans/managing.md
    - Plan Lifecycle: plans/lifecycle.md
    - Fair Usage Policy (FUP): plans/fup.md
  - Subscriptions:
    - Overview: subscriptions/index.md
    - Revenue Metrics: subscriptions/metrics.md
    - Renewing & Changing Plans: subscriptions/renewing.md
    - Suspending & Cancelling: subscriptions/managing.md
  - Payments:
    - Overview: payments/index.md
    - Recording a Manual Payment: payments/manual.md
    - M-Pesa STK Push: payments/stk-push.md
    - Unmatched Payments: payments/unmatched.md
  - Invoices:
    - Overview: invoices/index.md
    - Creating an Invoice: invoices/creating.md
    - Managing Invoices: invoices/managing.md
  - Subscriber Guide:
    - Overview: subscriber/index.md
    - Account Registration: subscriber/registration.md
    - FAQ: subscriber/faq.md
  - Call Center:
    - Overview: call-center/index.md
    - Support Channels: call-center/support-channels.md
    - Escalation Process: call-center/escalation.md
